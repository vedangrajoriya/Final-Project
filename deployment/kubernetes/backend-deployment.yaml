apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: ai-hospitality
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_GITHUB_ORG/YOUR_REPO_NAME-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: GROQ_API_KEY
            - name: DEAPI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: DEAPI_API_KEY
            - name: GROQ_MODEL
              value: "llama-3.3-70b-versatile"
            - name: DEAPI_IMAGE_MODEL
              value: "flux-1.1-schnell"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      imagePullSecrets:
        - name: ghcr-login-secret
